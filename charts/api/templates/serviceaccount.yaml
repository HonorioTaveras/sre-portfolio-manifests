# -----------------------------------------------------------------------------
# serviceaccount.yaml -- Kubernetes ServiceAccount
# A ServiceAccount gives a pod an identity inside Kubernetes.
# On AWS EKS, this is how IRSA works -- you annotate the ServiceAccount
# with an IAM role ARN and AWS grants the pod that role's permissions.
# The pod can then call AWS APIs (SQS, Secrets Manager, S3) without
# storing any credentials -- the token is rotated automatically.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-api
  annotations:
    # This annotation is what enables IRSA on EKS.
    # When set, AWS grants this pod the permissions of the specified IAM role.
    # On Minikube this annotation does nothing -- it's only active on EKS.
    # The actual IAM role is provisioned by Terraform in the iam module.
    eks.amazonaws.com/role-arn: {{ .Values.irsaRoleArn | default "" | quote }}
