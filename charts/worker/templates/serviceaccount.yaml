# -----------------------------------------------------------------------------
# serviceaccount.yaml -- Worker ServiceAccount
# The worker needs SQS permissions to poll messages.
# On EKS this ServiceAccount is annotated with an IRSA role that grants
# SQS receive, delete, and change visibility permissions.
# On Minikube the annotation does nothing.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.irsaRoleArn | default "" | quote }}
