# -----------------------------------------------------------------------------
# deployment.yaml -- Worker Deployment
# Nearly identical to the API deployment with two key differences:
# 1. Runs on port 8001 instead of 8000
# 2. Uses ddtrace env vars instead of OTel endpoint
# The worker has no Ingress -- it only communicates outbound to SQS and DB
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app: {{ .Release.Name }}-worker
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ .Release.Name }}-worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-worker
        tags.datadoghq.com/env:     {{ .Values.env }}
        tags.datadoghq.com/service: {{ .Release.Name }}-worker
        tags.datadoghq.com/version: {{ .Values.image.tag }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8001"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: {{ .Release.Name }}-worker
      containers:
        - name: worker
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-worker-secrets
                  key: database-url

            - name: SQS_QUEUE_URL
              value: {{ .Values.sqsQueueUrl | quote }}

            - name: AWS_REGION
              value: {{ .Values.awsRegion | quote }}

            # Datadog APM -- points to the agent DaemonSet on the same node
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP

            - name: DD_TRACE_AGENT_PORT
              value: "8126"

            - name: DD_SERVICE
              value: {{ .Release.Name }}-worker

            - name: DD_ENV
              value: {{ .Values.env }}

            - name: DD_VERSION
              value: {{ .Values.image.tag | quote }}

          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds:       {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold:    {{ .Values.readinessProbe.failureThreshold }}

          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds:       {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold:    {{ .Values.livenessProbe.failureThreshold }}

          resources:
            requests:
              cpu:    {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu:    {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
